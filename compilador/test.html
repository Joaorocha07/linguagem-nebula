<!DOCTYPE html>
<html>
<head>
    <title>Teste Nebula Compiler</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1e1e1e; color: #fff; }
        .success { color: #4ec9b0; }
        .error { color: #f14c4c; }
        pre { background: #252526; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Teste do Compilador Nebula</h1>
    <div id="result"></div>

    <script src="nebula_compiler.js"></script>
    <script>
        const compiler = new NebulaCompiler();
        const code = `criar x = 10;\nexibir(x + 5);`;

        let output = [];
        const result = compiler.execute(code, (val) => output.push(val));

        const div = document.getElementById('result');
        if (result.success) {
            div.innerHTML = `<p class="success">✓ Sucesso!</p><p>Saída: ${output.join(', ')}</p>`;
        } else {
            div.innerHTML = `<p class="error">✗ Erros: ${result.errors.join(', ')}</p>`;
        }
    </script>
</body>
</html>
